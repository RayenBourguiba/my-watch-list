apiVersion: apps/v1
kind: Deployment
metadata:
  name: watchlist
spec:
  replicas: 2
  selector:
    matchLabels:
      app: watchlist
  template:
    metadata:
      labels:
        app: watchlist
    spec:
      containers:
      - name: watchlist
        image: rayenbourguiba01/watchlist:prod
        ports:
        - containerPort: 8000
        env:
        - name: POSTGRES_HOST
          value: postgres-service
        - name: POSTGRES_DB
          value: watchlist
        - name: POSTGRES_USER
          value: watchlist
        - name: POSTGRES_PASSWORD
          value: watchlistpwd
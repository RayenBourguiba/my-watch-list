version: "3.8"

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: watchlist
      POSTGRES_USER: watchlist
      POSTGRES_PASSWORD: watchlistpwd
    ports:
      - "5432:5432"

  web:
    build: .
    environment:
      POSTGRES_HOST: db
      POSTGRES_DB: watchlist
      POSTGRES_USER: watchlist
      POSTGRES_PASSWORD: watchlistpwd
      ALLOWED_HOSTS: "localhost,127.0.0.1"
    ports:
      - "8000:8000"
    depends_on:
      - db